<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dragon ball verse - Cadastro</title>
    <link rel="stylesheet" href="../css/style_cadastro.css">
    <script src="../js/cep.js" defer></script>
</head>
<body>
    <main id="geral">
        <header id="cabecalho">
            <div id="logo">
                DragonBall Verse
            </div>

            <nav id="menu">
                <ul>
                    <li><a href="../index.html">Página Inicial</a></li>
                    <li><a href="sobre.html">Sobre</a></li>
                    <li><a href="login.html">Login</a></li>
                    <li><a href="carrinho.html"> <img src="/imagens/carrinho2.png" alt=""></a></li>
                </ul>
            </nav>

        </header>

        <section id="cadastr">
            <h3>Se cadastre e seja um membro de nossa família</h3>

            <form id="form" method="post" action="">
                <label for="nome">Nome</label>
                <input type="text" name="nome" id="nome" class="input-n01" maxlength="35" required placeholder="Informe seu nome">

                <label for="cpf">CPF</label>
                <input type="text" name="cpf" id="cpf" class="input-n02" maxlength="14" required placeholder="Informe o seu CPF">

                <label for="telefone">Telefone</label>
                <input type="tel" name="telefone" id="telefone" class="input-tel" required maxlength="15" placeholder="Informe seu telefone">

                <label for="email">Email</label>
                <input type="email" name="email" id="email" class="input-email" required placeholder="Informe seu email">

                <label for="nascimento">Data de Nascimento</label>
                <input type="date" id="nascimento" class="input-data" required>

                <label for="cep">CEP</label>
                <input type="text" name="cep" id="cep" class="input-n03" required placeholder="Informe seu CEP">

                <label for="endereco">Endereço</label>
                <input type="text" name="endereco" id="endereco" class="input-n04" required maxlength="80" placeholder="Informe seu endereço">

                <label for="residencia">Número da residência</label>
                <input type="number" name="residencia" id="residencia" class="input-num01" required placeholder="Informe o número da sua residencia">

                <label for="complemento">Complemento</label>
                <input type="text" name="complemento" id="complemento" class="input-n06" placeholder="Informe um complemento caso precise">

                <label for="bairro">Bairro</label>
                <input type="text" name="complemento" id="bairro" class="input-n07" required placeholder="Informe seu bairro">

                <label for="cidade">Cidade</label>
                <input type="text" name="cidade" id="cidade" class="input-n08" required placeholder="Informe sua cidade">

                <label for="estado">Estado</label>
                <select name="estado" id="estado" name="estado" class="input-op" required>
                    <option value="selecione">Selecione um estado</option>
                    <option value="AC">Acre</option>
                    <option value="AL">Alagoas</option>
                    <option value="AP">Amapá</option>
                    <option value="AM">Amazonas</option>
                    <option value="BA">Bahia</option>
                    <option value="CE">Ceará</option>
                    <option value="DF">Distrito Federal</option>
                    <option value="ES">Espírito Santo</option>
                    <option value="GO">Goiás</option>
                    <option value="MA">Maranhão</option>
                    <option value="MT">Mato Grosso</option>
                    <option value="MS">Mato Grosso do Sul</option>
                    <option value="MG">Minas Gerais</option>
                    <option value="PA">Pará</option>
                    <option value="PB">Paraíba</option>
                    <option value="PR">Paraná</option>
                    <option value="PE">Pernambuco</option>
                    <option value="PI">Piauí</option>
                    <option value="RJ">Rio de Janeiro</option>
                    <option value="RN">Rio Grande do Norte</option>
                    <option value="RS">Rio Grande do Sul</option>
                    <option value="RO">Rondônia</option>
                    <option value="RR">Roraima</option>
                    <option value="SC">Santa Catarina</option>
                    <option value="SP">São Paulo</option>
                    <option value="SE">Sergipe</option>
                    <option value="TO">Tocantins</option>
                </select> 

                <label for="senha">Senha</label>
                <input type="password" name="senha" id="senha" class="input-senha" required placeholder="Digite sua senha">

        


            </form>
            <div id="botoes">
                <button type="submit" id="btn-submit">Enviar</button>
                <button type="reset" id="btn-reset">Limpar</button>
            </div>
        </section>

     

    </main>
    
</body>
</html>
