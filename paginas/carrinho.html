<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dragon Ball Verse - Carrinho</title>

    <link rel="stylesheet" href="../css/style_carrinho.css">
    <script src="../js/tela_carrinho.js" defer type="module"></script>
</head>

<body>

    <main id="geral">

        <header id="cabecalho">

            <div id="logo">
                DragonBall Verse
            </div>

            <nav id="menu">
                <ul>
                    <li><a href="../index.html">Página Inicial</a></li>
                    <li><a href="sobre.html">Sobre</a></li>
                    <li><a href="login.html">Login</a></li>
                    <li><a href="cadastro.html">Cadastro</a></li>
                </ul>
            </nav>

        </header>

        <section id="carrinho">

            <!-- Os produtos serão inseridos pelo JavaScript -->
            <section id="itens-carrinho">

            </section>

            <section id="valores-carrinho">

                <div id="div-cep">

                    <h2 class="titulo-valores-carrinho">CEP</h2>

                    <input
                        type="text"
                        id="input-cep"
                        class="input-cep"
                        placeholder="Digite seu CEP">

                </div>

                <div id="div-calc-valor">

                    <h2 class="titulo-valores-carrinho">
                        Valor Total
                    </h2>

                    <p id="valor-produtos" class="valor">
                        R$ 0,00
                    </p>

                    <h2 class="titulo-valores-carrinho">
                        Valor do Frete
                    </h2>

                    <p id="valor-frete" class="valor">
                        R$ 0,00
                    </p>

                </div>

                <div id="div-calc-total">

                    <h2 class="titulo-valores-carrinho">
                        Total a Pagar
                    </h2>

                    <p id="valor-total" class="valor">
                        R$ 0,00
                    </p>

                </div>

                <button id="btn-finalizar">
                    Finalizar Compra
                </button>

                <button id="btn-continuar">
                    Continuar Comprando
                </button>

            </section>

        </section>

    </main>

</body>

</html>
