<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dragon ball verse - Cadastro</title>
    <link rel="stylesheet" href="../css/style_carrinho.css">
</head>
<body>
    <main id="geral">
        <header id="cabecalho">
            <div id="logo">
                DragonBall Verse
            </div>

            <nav id="menu">
                <ul>
                    <li><a href="../index.html">Página Inicial</a></li>
                    <li><a href="sobre.html">Sobre</a></li>
                    <li><a href="login.html">Login</a></li>
                    <li><a href="cadastro.html">Cadastro</a></li>
                </ul>
            </nav>

        </header>
    <section id="carrinho">
        <section id="itens-carrinho">
            <section class="item">
                <div class="img-item">
                    <img src="../imagens/gohan_beast.png" alt="gohan_beast">
                </div>
                <div class="descricoes-itens">
                    <div class="descricao">Gohan Beast
                    </div>
                    <div id="valores">
                        <p>R$25,00</p>
                        <div class="input-quantidade">
                            <input type="number" name="quant01" id="quant01" class="input-item" value="1">
                        </div>
                    </div> 
                </div>
            </section>

            <section id="itens-carrinho">
                <section class="item">
                    <div class="img-item">
                        <img src="../imagens/goku_ssj1.png" alt="gohan_beast">
                    </div>
                    <div id="descricoes-itens">
                        <div class="descricao">Goku ssj1
                        </div>
                        <div id="valores">
                            <p>R$25,00</p>
                            <div class="input-quantidade">
                                <input type="number" name="quant01" id="quant01" class="input-item" value="1">
                            </div>
                        </div> 
                    </div>
                </section>

                <section id="itens-carrinho">
                    <section class="item">
                        <div class="img-item">
                            <img src="../imagens/goku_ssj2.png" alt="gohan_beast">
                        </div>
                        <div id="descricoes-itens">
                            <div class="descricao">Goku ssj2
                            </div>
                            <div id="valores">
                                <p>R$25,00</p>
                                <div class="input-quantidade">
                                    <input type="number" name="quant01" id="quant01" class="input-item" value="1">
                                </div>
                            </div> 
                        </div>
                    </section>

                    <section id="itens-carrinho">
                        <section class="item">
                            <div class="img-item">
                                <img src="../imagens/goku_ssj3.png" alt="gohan_beast">
                            </div>
                            <div id="descricoes-itens">
                                <div class="descricao">Goku ssj3
                                </div>
                                <div id="valores">
                                    <p>R$25,00</p>
                                    <div class="input-quantidade">
                                        <input type="number" name="quant01" id="quant01" class="input-item" value="1">
                                    </div>
                                </div> 
                            </div>
                        </section>

                        <section id="itens-carrinho">
                            <section class="item">
                                <div class="img-item">
                                    <img src="../imagens/goku_ssj4.png" alt="gohan_beast">
                                </div>
                                <div id="descricoes-itens">
                                    <div class="descricao">Goku ssj4
                                    </div>
                                    <div id="valores">
                                        <p>R$25,00</p>
                                        <div class="input-quantidade">
                                            <input type="number" name="quant01" id="quant01" class="input-item" value="1">
                                        </div>
                                    </div> 
                                </div>
                            </section>
        </section>
        <section id="valores-carrinho">
            <div id="div-cep">
                <h2 class="titulo-valores-carrinho">CEP</h2>
                <div id="input-cep">
                    <input type="text" name="input-cep" id="input-cep" class="input-cep">
                </div>

                <div id="div-calc-valor">
                    <h2 class="titulo-valores-carrinho">Valor total</h2>
                    <p id="valor-total" class="valor">R$ 100,00</p>

                    <h2 class="titulo-valores-carrinho">Valor do Frete</h2>
                    <p id="valor-total" class="valor">R$ 1,00</p>
                </div>
                <div id="div-calc-total">
                    <h2 class="titulo-valores-carrinho">Total a pagar</h2>
                    <p id="valor-total" class="valor">R$ 101,00</p>
                </div>
                <button id="btn-finalizar" class="btn-finalizar" type="submit">Finalizar compra</button>
                <button id="btn-continuar" class="btn-continuar">Continuar Comprando</button>

                
            </div>
        </section>
    </section>
    
</body>
</html>
